<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spotmeta | GeoGuessr Meta Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
</head>
<body>

<div class="top-bar">
    <div class="search-box">
        <div class="search-input-container">
            <i class="fas fa-search" style="color: #94a3b8; margin-left: 10px;"></i>
            <input type="text" id="search-input" placeholder="Search meta places..." autocomplete="off">
            <button id="clear-search" class="icon-button" title="Clear search">
                <i class="fas fa-times-circle"></i>
            </button>
        </div>
        <div class="search-results" id="search-results"></div>
    </div>
</div>

<div class="shortcut-container">
    <button class="shortcut-btn" onclick="goToRegion(1.3733, 32.2903, 7)">🇺🇬 Uganda</button>
    <button class="shortcut-btn" onclick="goToRegion(-1.2863, 36.8219, 7)">🇰🇪 Kenya</button>
    <button class="shortcut-btn" onclick="goToRegion(5.6037, -0.1870, 7)">🇬🇭 Ghana</button>
    <button class="shortcut-btn" onclick="goToRegion(14.6349, -90.5069, 8)">🇬🇹 Guatemala</button>
</div>

<div class="custom-controls">
    <button id="theme-toggle" class="control-btn" title="Toggle Dark Mode">
        <i class="fas fa-moon"></i>
    </button>
    <button id="open-login" class="control-btn" title="Login">
        <i class="fas fa-user-lock"></i>
    </button>
    <button id="doLogout" class="control-btn" title="Logout" style="display: none;">
        <i class="fas fa-sign-out-alt"></i>
    </button>
</div>

<div class="layer-controls-container">
    <div class="layer-controls">
        <button class="layer-btn active" data-layer="street">Map</button>
        <button class="layer-btn" data-layer="satellite">Satellite</button>
        <button class="layer-btn" data-layer="topo">Terrain</button>
    </div>
</div>

<div id="map"></div>

<div id="loginModal" class="meta-modal-bg" style="display: none;">
    <div class="auth-container">
        <span class="close-x" onclick="document.getElementById('loginModal').style.display='none'">&times;</span>

        <div id="auth-content" class="auth-content-wrapper">
            <div class="auth-icon-top">
                <i class="fas fa-shield-alt"></i>
            </div>

            <h2 id="auth-title">Sign in</h2>
            <p id="auth-subtitle">Manage your GeoGuessr metas.</p>

            <div class="auth-input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="login-email" class="auth-field" placeholder="Email">
            </div>

            <div class="auth-input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="login-password" class="auth-field" placeholder="Password">
            </div>

            <div id="h-captcha-box" class="h-captcha" data-sitekey="fb0eac34-6dfe-4d42-ae52-a7ecfb144f50" data-theme="dark" style="margin-bottom: 15px;"></div>

            <button id="auth-action-btn" class="btn-primary-auth">Get Started</button>

            <div style="text-align: center; margin-top: 25px;">
                <a href="#" id="toggle-auth" style="color: #2563eb; font-size: 0.85rem; font-weight: 600; text-decoration: none;">Create an account</a>
            </div>
        </div>
    </div>
</div>

<div id="disclaimerModal" class="meta-modal-bg" style="display: flex;">
    <div class="meta-modal-content">
        <div class="auth-icon-top" style="background: rgba(37, 99, 235, 0.1); color: #2563eb;">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h2 style="margin-bottom: 10px;">Welcome to Spotmeta</h2>
        <div style="text-align: left; margin: 20px 0; line-height: 1.6; color: #475569; font-size: 0.95rem;">
            <ul style="padding-left: 20px;">
                <li>Educational purposes only.</li>
                <li>Respect GeoGuessr community rules.</li>
            </ul>
        </div>
        <button id="acceptTerms" onclick="window.acceptDisclaimer()" class="btn-primary-auth">
            I UNDERSTAND & ACCEPT
        </button>
    </div>
</div>

<div id="metaModal" class="meta-modal-bg" style="display: none;">
    <div class="meta-modal-content">
        <span class="close-x" onclick="window.closeMetaForm()">&times;</span>
        <h3 style="font-weight: 700; margin-bottom: 5px;">Report Location</h3>
        <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 20px;">
            Pinning: <strong id="display-coords" style="color: #1e293b;">0.00, 0.00</strong>
        </p>

        <input type="hidden" id="modal-lat">
        <input type="hidden" id="modal-lng">

        <div style="text-align: left;">
            <label style="display: block; font-weight: 700; font-size: 0.85rem; margin-bottom: 8px; color: #1e293b;">TAGS</label>
            <div class="tag-grid">
                <label><input type="checkbox" class="meta-tag" value="ghana"><span class="tag-label">🇬🇭 Ghana Tape</span></label>
                <label><input type="checkbox" class="meta-tag" value="car"><span class="tag-label">🚗 Car Meta</span></label>
                <label><input type="checkbox" class="meta-tag" value="snorkel"><span class="tag-label">🤿 Snorkel</span></label>
            </div>
        </div>

        <div style="margin-top: 30px; display: flex; gap: 12px;">
            <button onclick="window.closeMetaForm()" style="flex: 1; padding: 14px; border: 1px solid #e2e8f0; background: #f8fafc; border-radius: 12px; font-weight: 600; color: #64748b;">Cancel</button>
            <button id="finalSubmit" class="btn-primary-auth" style="flex: 2; margin-top: 0;">Submit Pin</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="main.js"></script>

<script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/speed-insights/script.js"></script>
<script defer src="/_vercel/insights/script.js"></script>

</body>
</html>
